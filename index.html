<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>make some fun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="arcade">
  
  <!-- 🎨 테마 선택 버튼 (상단 고정) -->
  <div class="board-theme-picker" id="themeSwitcher">
    <button class="theme-dot active" data-theme-choice="arcade" style="background:#fffd6d" type="button" title="스노우"></button>
    <button class="theme-dot" data-theme-choice="night" style="background:#00a2ff" type="button" title="한밤중"></button>
    <button class="theme-dot" data-theme-choice="wood" style="background:#91ff96" type="button" title="우드보드"></button>
    <button class="theme-dot" data-theme-choice="neon" style="background:#ff3d9a" type="button" title="네온"></button>
  </div>

  <!-- ⚙️ 우측 상단 컨트롤 버튼 -->
  <div class="board-controls">
    <button id="resetBtn" class="icon-btn" type="button" title="보드 초기화">↺</button>
    <button id="bgmBtn" class="icon-btn" type="button" title="배경음악 켜기/끄기">🔈</button>
  </div>

  <!-- 🎯 메인 게임 무대 영역 -->
  <div class="stage-area">
    
    <!-- ⬅️ 왼쪽 에셋 사이드바 (기존 lips, eyes 아이템들이 들어갈 곳) -->
    <div class="sidebar left" id="sidebar-left"></div>

    <!-- 🖥️ 가운데 보드판 영역 -->
    <div class="board-frame">
      <div class="board" id="board"></div>
    </div>

    <!-- ➡️ 오른쪽 에셋 사이드바 (기존 accessories 아이템들이 들어갈 곳) -->
    <div class="sidebar right" id="sidebar-right"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
